version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-chat-db
    environment:
      POSTGRES_DB: taskflow_chat
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
    ports:
      - "5433:5432"
    volumes:
      - pgdata_chat:/var/lib/postgresql/data

volumes:
  pgdata_chat: