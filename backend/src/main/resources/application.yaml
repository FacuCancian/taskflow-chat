ktor:
  application:
    modules:
      - com.facundo.ApplicationKt.module
  deployment:
    port: 8082

database:
  url: ${DATABASE_URL}
  driver: "org.postgresql.Driver"
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  issuer: "taskflow-chat"
  audience: "taskflow-users"
  realm: "taskflow-chat"